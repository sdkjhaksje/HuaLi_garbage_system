<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据统计 - 社区垃圾与火情识别预警系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; }

.gradient-text {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.gradient-primary {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
}

.glass {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(12px);
}

.cyber-grid {
  background-image: 
    linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes countUp {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

.fade-in {
  animation: fadeIn 0.6s ease-out forwards;
}

.count-up {
  animation: countUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.stat-card {
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.stat-card:hover {
  transform: translateY(-6px) scale(1.02);
}

.chart-bar {
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 8px 8px 0 0;
}

.chart-bar:hover {
  filter: brightness(1.1);
  transform: scaleY(1.05);
  transform-origin: bottom;
}

.donut-chart {
  transform: rotate(-90deg);
}

.donut-segment {
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.donut-segment:hover {
  filter: brightness(1.1);
  transform: scale(1.02);
  transform-origin: center;
}

.nav-link {
  position: relative;
}
.nav-link::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 50%;
  width: 0;
  height: 2px;
  background: #10b981;
  transition: all 0.3s;
  transform: translateX(-50%);
}
.nav-link:hover::after, .nav-link.active::after {
  width: 100%;
}

.glow-green {
  box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
}

.breathing {
  animation: breathing 3s ease-in-out infinite;
}

@keyframes breathing {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.02); opacity: 0.9; }
}

.tooltip {
  position: absolute;
  background: rgba(0, 0, 0, 0.8);
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 100;
}

.tooltip.visible {
  opacity: 1;
}
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navigation -->
<nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-gray-200/50">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2"><span class="text-xl font-bold">社区垃圾与火情<span class="gradient-text">识别预警系统</span></span></a>
    
    <div class="flex items-center gap-1">
      <a href="/" class="nav-link px-4 py-2 text-sm font-medium text-gray-500 hover:text-emerald-600 rounded-lg">首页</a>
      <a href="/detection" class="nav-link px-4 py-2 text-sm font-medium text-gray-500 hover:text-emerald-600 rounded-lg">智慧检测</a>
      <a href="/alerts" class="nav-link px-4 py-2 text-sm font-medium text-gray-500 hover:text-emerald-600 rounded-lg">预警记录</a>
      <a href="/statistics" class="nav-link active px-4 py-2 text-sm font-medium text-gray-700 hover:text-emerald-600 rounded-lg">数据统计</a>
      <a href="/dataset" class="nav-link px-4 py-2 text-sm font-medium text-gray-500 hover:text-emerald-600 rounded-lg">数据集</a>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="pt-24 pb-16 cyber-grid min-h-screen">
  <div class="max-w-7xl mx-auto px-6">
    <!-- Header -->
    <div class="mb-8 fade-in">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">数据统计分析</h1>
      <p class="text-gray-500">实时监测社区垃圾分类情况，掌握数据趋势</p>
    </div>
    
    <!-- Stats Overview -->
    <div class="grid grid-cols-4 gap-6 mb-8">
      <!-- Total Detections -->
      <div class="stat-card rounded-2xl p-6 shadow-lg border border-white/50 hover:shadow-xl">
        <div class="flex items-center justify-between mb-4">
          <div class="w-14 h-14 rounded-2xl bg-white/50 flex items-center justify-center">
            <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <span class="text-xs font-medium text-emerald-600 bg-emerald-100 px-3 py-1 rounded-full">总检测</span>
        </div>
        <div class="text-4xl font-extrabold text-gray-800 mb-1 count-up" id="stat-total">0</div>
        <div class="text-sm text-gray-500 flex items-center gap-1">
          <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
          </svg>
          累计检测次数
        </div>
      </div>
      
      <!-- Alerts -->
      <div class="stat-card rounded-2xl p-6 shadow-lg border border-white/50 hover:shadow-xl">
        <div class="flex items-center justify-between mb-4">
          <div class="w-14 h-14 rounded-2xl bg-white/50 flex items-center justify-center">
            <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
          </div>
          <span class="text-xs font-medium text-red-600 bg-red-100 px-3 py-1 rounded-full">预警</span>
        </div>
        <div class="text-4xl font-extrabold text-red-600 mb-1 count-up" id="stat-alerts">0</div>
        <div class="text-sm text-gray-500 flex items-center gap-1">
          <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
          </svg>
          触发预警次数
        </div>
      </div>
      
      <!-- Detection Rate -->
      <div class="stat-card rounded-2xl p-6 shadow-lg border border-white/50 hover:shadow-xl">
        <div class="flex items-center justify-between mb-4">
          <div class="w-14 h-14 rounded-2xl bg-white/50 flex items-center justify-center">
            <svg class="w-7 h-7 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <span class="text-xs font-medium text-blue-600 bg-blue-100 px-3 py-1 rounded-full">今日</span>
        </div>
        <div class="text-4xl font-extrabold text-blue-600 mb-1" id="stat-today">0</div>
        <div class="text-sm text-gray-500 flex items-center gap-1">
          <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
          </svg>
          今日检测数
        </div>
      </div>
      
      <!-- Active Time -->
      <div class="stat-card rounded-2xl p-6 shadow-lg border border-white/50 hover:shadow-xl">
        <div class="flex items-center justify-between mb-4">
          <div class="w-14 h-14 rounded-2xl bg-white/50 flex items-center justify-center">
            <svg class="w-7 h-7 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <span class="text-xs font-medium text-purple-600 bg-purple-100 px-3 py-1 rounded-full">运行时长</span>
        </div>
        <div class="text-4xl font-extrabold text-purple-600 mb-1" id="stat-runtime">0h</div>
        <div class="text-sm text-gray-500 flex items-center gap-1">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          <span id="start-time">系统运行</span>
        </div>
      </div>
    </div>
    
    <!-- Charts Row -->
    <div class="grid lg:grid-cols-3 gap-6 mb-8">
      <!-- Bar Chart - Class Distribution -->
      <div class="lg:col-span-2 bg-white rounded-3xl shadow-xl border border-gray-100 p-6 fade-in">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-xl font-bold text-gray-800">类别分布</h2>
            <p class="text-sm text-gray-500">各类别检测数量统计</p>
          </div>
        </div>
        
        <div id="class-chart" class="space-y-4">
          <!-- Class bars will be inserted here -->
          <div class="text-center py-12 text-gray-500">
            加载...
          </div>
        </div>
      </div>
      
      <!-- Donut Chart -->
      <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6 fade-in">
        <div class="mb-6">
          <h2 class="text-xl font-bold text-gray-800">预警占比</h2>
          <p class="text-sm text-gray-500">预警类型分布</p>
        </div>
        
        <div class="flex flex-col items-center">
          <!-- SVG Donut Chart -->
          <svg id="donut-svg" class="w-48 h-48 -rotate-90" viewBox="0 0 100 100">
            <circle id="donut-bg" cx="50" cy="50" r="40" fill="none" stroke="#f3f4f6" stroke-width="12"/>
            <!-- Dynamic segments will be inserted here -->
          </svg>
          
          <!-- Center text -->
          <div class="-mt-32 text-center">
            <div class="text-4xl font-extrabold text-gray-800" id="donut-center">0</div>
            <div class="text-sm text-gray-500">预警总数</div>
          </div>
          
          <!-- Legend -->
          <div id="donut-legend" class="mt-8 space-y-3 w-full">
            <!-- Legend items will be inserted here -->
          </div>
        </div>
      </div>
    </div>
    
    <!-- Bottom Row -->
    <div class="grid lg:grid-cols-2 gap-6">
      <!-- 24 Hour Distribution -->
      <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6 fade-in">
        <div class="mb-6">
          <h2 class="text-xl font-bold text-gray-800">24小时预警分布</h2>
          <p class="text-sm text-gray-500">各时段预警活跃度</p>
        </div>
        
        <div id="hourly-chart" class="h-32 flex items-end gap-1 px-2">
          <!-- Hour bars (0-23) will be inserted here -->
        </div>
        
        <div class="flex justify-between mt-2 px-2 text-xs text-gray-400">
          <span>00:00</span>
          <span>06:00</span>
          <span>12:00</span>
          <span>18:00</span>
          <span>24:00</span>
        </div>
        
        <div class="mt-4 p-4 bg-emerald-50 rounded-xl flex items-center gap-3" id="peak-hour-info">
          <div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center">
            <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
            </svg>
          </div>
          <div>
            <div class="font-semibold text-gray-800" id="peak-hour-label">加载...</div>
            <div class="text-sm text-gray-500" id="peak-hour-detail">正在获取数据</div>
          </div>
        </div>
      </div>
      
      <!-- Recent Alerts -->
      <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6 fade-in">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-xl font-bold text-gray-800">预警记录统计</h2>
            <p class="text-sm text-gray-500">各类预警详情</p>
          </div>
          <a href="/alerts" class="text-sm font-medium text-emerald-600 hover:text-emerald-700 flex items-center gap-1">预警记录</a>
        </div>
        
        <div id="alert-stats" class="space-y-4">
          <!-- Alert stats will be inserted here -->
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Tooltip -->
<div id="tooltip" class="tooltip"></div>

<script>
const typeConfig = {
  0: { icon: '🗑️', label: '垃圾桶', color: '#10b981', alert: false },
  1: { icon: '⚠️', label: '垃圾溢出', color: '#f59e0b', alert: true },
  2: { icon: '🧹', label: '散落垃圾', color: '#f97316', alert: true },
  3: { icon: '🔥', label: '火焰', color: '#ef4444', alert: true },
  4: { icon: '💨', label: '烟雾', color: '#8b5cf6', alert: true },
  garbage_bin: { icon: '🗑️', label: '垃圾桶', color: '#10b981', alert: false },
  overflow: { icon: '⚠️', label: '垃圾溢出', color: '#f59e0b', alert: true },
  garbage: { icon: '🧹', label: '散落垃圾', color: '#f97316', alert: true },
  fire: { icon: '🔥', label: '火焰', color: '#ef4444', alert: true },
  smoke: { icon: '💨', label: '烟雾', color: '#8b5cf6', alert: true }
};

let autoRefreshInterval = null;

document.addEventListener('DOMContentLoaded', () => {
  loadStatistics();
  startAutoRefresh();
});

window.addEventListener('beforeunload', () => {
  stopAutoRefresh();
});

function startAutoRefresh() {
  if (autoRefreshInterval) {
    return;
  }
  autoRefreshInterval = setInterval(loadStatistics, 10000);
}

function stopAutoRefresh() {
  if (!autoRefreshInterval) {
    return;
  }
  clearInterval(autoRefreshInterval);
  autoRefreshInterval = null;
}

async function loadStatistics() {
  try {
    const response = await fetch('/api/statistics');
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(data.error || '获取统计数据失败');
    }
    updateUI(data);
  } catch (error) {
    console.error('加载统计数据失败:', error);
    showLoadError();
  }
}

function showLoadError() {
  document.getElementById('class-chart').innerHTML = '<div class="text-center py-12 text-gray-500">统计加载失败</div>';
  document.getElementById('donut-legend').innerHTML = '<div class="text-center text-gray-500 py-4">暂无数据</div>';
  document.getElementById('alert-stats').innerHTML = '<div class="text-center py-8 text-gray-500">暂无预警数据</div>';
}

function updateUI(data) {
  const totalDetections = Number(data.total_detections || 0);
  const totalAlerts = Number(data.total_alerts || 0);
  const todayAlerts = Number(data.today_alerts || 0);
  const classStats = Array.isArray(data.class_stats) ? data.class_stats : [];
  const hourlyAlerts = Array.isArray(data.hourly_alerts) ? data.hourly_alerts : [];

  document.getElementById('stat-total').textContent = totalDetections.toLocaleString();
  document.getElementById('stat-alerts').textContent = totalAlerts.toLocaleString();
  document.getElementById('stat-today').textContent = todayAlerts.toLocaleString();

  updateRuntime(data.start_time);
  updateClassChart(classStats);
  updateDonutChart(classStats);
  updateHourlyChart(hourlyAlerts);
  updateAlertStats(classStats);
}

function updateRuntime(startTimeRaw) {
  if (!startTimeRaw) {
    document.getElementById('stat-runtime').textContent = '0h';
    document.getElementById('start-time').textContent = '系统运行中';
    return;
  }

  const startTime = new Date(String(startTimeRaw).replace(' ', 'T'));
  if (Number.isNaN(startTime.getTime())) {
    document.getElementById('stat-runtime').textContent = '0h';
    document.getElementById('start-time').textContent = String(startTimeRaw);
    return;
  }

  const now = new Date();
  const hours = Math.max(0, Math.floor((now - startTime) / (1000 * 60 * 60)));
  document.getElementById('stat-runtime').textContent = `${hours}h`;
  document.getElementById('start-time').textContent = `自 ${startTime.toLocaleString()}`;
}

function updateClassChart(classStats) {
  const container = document.getElementById('class-chart');
  if (!classStats.length) {
    container.innerHTML = '<div class="text-center py-12 text-gray-500">暂无数据</div>';
    return;
  }

  const maxCount = Math.max(...classStats.map((s) => Number(s.count || 0)), 1);
  container.innerHTML = classStats.map((stat) => {
    const config = typeConfig[stat.class_id] || typeConfig[stat.class_name] || {
      icon: '📌',
      label: stat.class_name || `类别 ${stat.class_id}`,
      color: '#10b981',
      alert: Boolean(stat.is_alert)
    };
    const count = Number(stat.count || 0);
    const percent = (count / maxCount) * 100;

    return `
      <div class="flex items-center gap-4">
        <div class="w-28 flex items-center gap-2">
          <span class="text-lg">${config.icon}</span>
          <span class="text-sm font-medium text-gray-700 truncate">${config.label}</span>
        </div>
        <div class="flex-1 h-8 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-full rounded-full flex items-center justify-end pr-3" style="width: ${percent.toFixed(1)}%; background: ${config.color};">
            ${percent > 15 ? `<span class="text-white text-xs font-bold">${count}</span>` : ''}
          </div>
        </div>
        <span class="w-16 text-right text-sm font-bold text-gray-700">${count}</span>
      </div>
    `;
  }).join('');
}

function updateDonutChart(classStats) {
  const alertStats = classStats.filter((s) => Boolean(s.is_alert));
  const totalAlerts = alertStats.reduce((sum, s) => sum + Number(s.count || 0), 0);
  document.getElementById('donut-center').textContent = String(totalAlerts);

  const legendEl = document.getElementById('donut-legend');
  const svg = document.getElementById('donut-svg');
  if (!svg) {
    legendEl.innerHTML = '<div class="text-center text-gray-500 py-4">图表容器缺失</div>';
    return;
  }

  if (!alertStats.length) {
    svg.innerHTML = '<circle cx="50" cy="50" r="40" fill="none" stroke="#f3f4f6" stroke-width="12"/>';
    legendEl.innerHTML = '<div class="text-center text-gray-500 py-4">暂无预警数据</div>';
    return;
  }

  const circumference = 2 * Math.PI * 40;
  let offset = 0;
  let circles = '<circle cx="50" cy="50" r="40" fill="none" stroke="#f3f4f6" stroke-width="12"/>';

  legendEl.innerHTML = alertStats.map((stat) => {
    const config = typeConfig[stat.class_id] || typeConfig[stat.class_name] || {
      icon: '📌',
      label: stat.class_name || `类别 ${stat.class_id}`,
      color: '#ef4444'
    };
    const count = Number(stat.count || 0);
    const ratio = totalAlerts > 0 ? (count / totalAlerts) : 0;
    const dashLength = ratio * circumference;

    circles += `<circle cx="50" cy="50" r="40" fill="none" stroke="${config.color}" stroke-width="12" stroke-dasharray="${dashLength} ${circumference}" stroke-dashoffset="${-offset}"/>`;
    offset += dashLength;

    return `
      <div class="flex items-center justify-between p-3 rounded-xl" style="background: ${config.color}15;">
        <div class="flex items-center gap-3">
          <div class="w-4 h-4 rounded-full" style="background: ${config.color};"></div>
          <span class="text-sm font-medium text-gray-700">${config.icon} ${config.label}</span>
        </div>
        <span class="font-bold" style="color: ${config.color};">${(ratio * 100).toFixed(1)}%</span>
      </div>
    `;
  }).join('');

  svg.innerHTML = circles;
}

function updateHourlyChart(hourlyData) {
  const data = Array.from({ length: 24 }, (_, i) => Number(hourlyData[i] || 0));
  const maxCount = Math.max(...data, 1);
  const container = document.getElementById('hourly-chart');

  container.innerHTML = data.map((count, hour) => {
    const height = count > 0 ? (count / maxCount) * 100 : 5;
    const isPeak = count === maxCount && count > 0;
    const bg = isPeak ? '#10b981' : '#6ee7b7';

    return `<div class="flex-1 rounded-t-sm cursor-pointer" style="height: ${height}%; background: ${bg};" data-hour="${hour}" data-count="${count}"></div>`;
  }).join('');

  const peakCount = Math.max(...data);
  const peakHour = data.indexOf(peakCount);
  document.getElementById('peak-hour-label').textContent = `高峰时段: ${peakHour}:00 - ${peakHour + 1}:00`;
  document.getElementById('peak-hour-detail').textContent = peakCount > 0
    ? `该时段预警 ${peakCount} 次，占全天 ${(peakCount / Math.max(data.reduce((a, b) => a + b, 1), 1) * 100).toFixed(1)}%`
    : '暂无预警数据';

  container.querySelectorAll('[data-hour]').forEach((bar) => {
    bar.addEventListener('mouseenter', (event) => {
      const hour = Number(bar.dataset.hour);
      const count = Number(bar.dataset.count);
      showTooltip(`${hour}:00 - ${hour + 1}:00: ${count} 次预警`, event);
    });
    bar.addEventListener('mouseleave', hideTooltip);
  });
}

function updateAlertStats(classStats) {
  const container = document.getElementById('alert-stats');
  const alertStats = classStats.filter((s) => Boolean(s.is_alert));

  if (!alertStats.length) {
    container.innerHTML = '<div class="text-center py-8 text-gray-500">暂无预警数据</div>';
    return;
  }

  container.innerHTML = alertStats.slice(0, 4).map((stat) => {
    const config = typeConfig[stat.class_id] || typeConfig[stat.class_name] || {
      icon: '📌',
      label: stat.class_name || `类别 ${stat.class_id}`,
      color: '#ef4444'
    };
    const count = Number(stat.count || 0);

    return `
      <div class="flex items-center gap-4 p-4 rounded-xl border border-gray-100 hover:shadow-md transition-shadow">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl" style="background: ${config.color}15;">
          ${config.icon}
        </div>
        <div class="flex-1">
          <div class="font-semibold text-gray-800">${config.label}</div>
          <div class="text-sm text-gray-500">共 ${count} 次预警</div>
        </div>
        <div class="text-right">
          <div class="text-lg font-bold" style="color: ${config.color};">${count}</div>
        </div>
      </div>
    `;
  }).join('');
}

function showTooltip(text, event) {
  const tooltip = document.getElementById('tooltip');
  tooltip.textContent = text;
  tooltip.classList.add('visible');
  tooltip.style.left = `${event.clientX + 10}px`;
  tooltip.style.top = `${event.clientY - 30}px`;
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}
</script>
